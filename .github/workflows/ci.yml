name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: test -z "$(gofmt -l .)" || { gofmt -l .; echo "Run: gofmt -w ."; exit 1; }

      - name: Vet
        run: go vet ./...

      - name: Check module tidiness
        run: |
          cp go.mod go.mod.bak
          [ -f go.sum ] && cp go.sum go.sum.bak || true
          go mod tidy
          diff go.mod go.mod.bak || { echo "go.mod is out of date. Run: go mod tidy"; exit 1; }
          if [ -f go.sum.bak ]; then
            diff go.sum go.sum.bak || { echo "go.sum is out of date. Run: go mod tidy"; exit 1; }
          fi

      - name: Test
        run: go test ./...
