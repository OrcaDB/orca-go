name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump level"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commits since last tag
        run: |
          latest=$(git describe --tags --abbrev=0)
          echo "latest_tag=$latest" >> "$GITHUB_ENV"

          commits=$(git log "${latest}..HEAD" --oneline)
          if [ -z "$commits" ]; then
            echo "::error::No commits since ${latest}. Nothing to release."
            exit 1
          fi
          echo "Commits since ${latest}:"
          echo "$commits"

      - name: Compute next version
        run: |
          tag="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$tag"

          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          next="v${major}.${minor}.${patch}"

          if git rev-parse "$next" >/dev/null 2>&1; then
            echo "::error::Tag ${next} already exists."
            exit 1
          fi

          echo "next_version=$next" >> "$GITHUB_ENV"
          echo "Next version: $next"

      - name: Generate release notes
        run: |
          notes=$(git log "${latest_tag}..HEAD" --pretty=format:"- %s" --reverse)
          {
            echo 'release_notes<<NOTES_EOF'
            echo "$notes"
            echo 'NOTES_EOF'
          } >> "$GITHUB_ENV"
          echo "$notes"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$next_version" -m "$next_version"
          git push origin "$next_version"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$next_version" \
            --title "$next_version" \
            --notes "$release_notes"
